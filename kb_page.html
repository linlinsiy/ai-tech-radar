<script type="text/javascript">
var isProd = !(location.host.indexOf("test") != -1  || location.host.indexOf("uat") != -1 || location.host.indexOf("sit") != -1 || location.host.indexOf("localhost") != -1 || location.host.indexOf("127.0.0.1") != -1 || location.host.indexOf("168.64.") != -1);
var isLink = location.hostname.indexOf("link") != -1 || location.hostname.indexOf("168.64.34.164") != -1  || location.hostname.indexOf("168.7.17.41") != -1  || location.hostname.indexOf("168.7.17.49") != -1 ;
var wxScanUrl = isProd ? "https://link.htsc.com.cn/wwopen/sso/qrConnect?appid=wwd53282142c96185d&agentid=1000131" : "http://link-test.htsc.com.cn:8990/wwopen/sso/qrConnect?appid=ww90dba4dc323845a2&agentid=1000116";

var logging = false;
var checkUserLoginInterval = 30;
var checkUserLoginHandler;

var currentLoginWorkId;
setInterval(function(){
	if(currentLoginWorkId) {
		$("#username").val(currentLoginWorkId + "  " + (new Date().toLocaleString()));
	}
}, 1000);

var $msg;
var msgAlert = {
	clear: function() {
		$("#msg")[0].innerHTML = "";
	},
	error: function(msg) {
		console.error(msg);
		$msg[0].innerHTML = "<span style='color: red; display: none' title='"+msg+"'>" + msg +"</span>";
		$("span", $msg).slideDown();
	},
	info: function(msg) {
		console.log(msg);
		$msg[0].innerHTML = "<span title='"+msg+"' style='display: none'>" + msg +"</span>";
		$("span", $msg).slideDown();
	}
}

function checkUserLogin(){
	console.log("check user login " + (new Date()).toLocaleTimeString())
	 $.ajax({
		method:"get",
		url:'/gateway/my?rand='+(new Date()).getTime(),
		success:function(res) {
	 		console.log("login result:", res);
			clearTimeout(checkUserLoginHandler);
			checkUserLoginHandler = setTimeout(checkUserLogin, Math.min( ++checkUserLoginInterval, 300) * 1000);
			if(res && res.resultData && res.resultData.workId) {
				currentLoginWorkId = res.resultData.workId;
				if(url) {
					// 有跳转页面，前往
					location.href = url;
				} else if(location.href.indexOf("/gateway/web/index.html") != -1){
					// 没有跳转页面，访问网关登录页，则在当前页面保持不变
					$("#wx_reg")[0].innerHTML = "";
					$("#wx_reg").css({height: "200px"});
					$("#username").attr("readonly", "readonly").parent().css({top: "20px", position:"relative"});
					$("#password").parent().hide()
					$("#submit").hide();
					$("#gotoHome").show().css({marginTop: "40px"});
					$("#logout").show().css({marginTop: "20px"});
				} else {
					// 页面替换登录页，刷新一下
					if(location.pathname.indexOf('/gateway/web/') == 0) {
						location.href = "/";
					}else{
						location.reload();
					}					
				}
			}else{
				// 发现用户掉线了,刷新
				if(currentLoginWorkId) {
					location.reload();
				}
			}
		}
	});
}

window.onfocus = function(){
	console.log("window.onfocus");
	checkUserLogin();
}

document.addEventListener('visibilitychange', function () {
	console.log("window.visibilitychange: "+document.visibilityState);
	checkUserLogin();
})

function getUrlParameter(sParam) {
	var sPageURL = window.location.search.substring(1),
			sURLVariables = sPageURL.split('&'),
			sParameterName,
			i;

	for (i = 0; i < sURLVariables.length; i++) {
		sParameterName = sURLVariables[i].split('=');

		if (sParameterName[0] === sParam) {
			return sParameterName[1] === undefined ? true : decodeURIComponent(sParameterName[1]);
		}
	}
	return "";
}

function checkForm() {
	if(logging){
		return ;
	}
	if(!$.trim($("#username").val())) {
		msgAlert.error("用户名不能为空. ");
	}
	if(!$.trim($("#password").val())) {
		msgAlert.error("密码不能为空. ");
	}
	logging = true;
	$("#submit").addClass('disabled').val("登录中...");
	msgAlert.clear();
	$.ajax({
		method:"post",
		url:'/gateway/login?rand='+(new Date()).getTime(),
		data: JSON.stringify({
			username: $.trim($("#username").val()),
			password: $("#password").val()
		}),
		contentType: "application/json",
		success: function(res) {
			console.log(res);
			logging = false;
			if(res.code == 0) {
				$("#submit").val("欢迎回来!");
				debugger
				if(url) {
					location.href = url;
				}else{
					location.reload();
				}				
				// checkUserLogin();
			}else{
				$("#submit").removeClass('disabled').val("登  录");
				var msg = res.message || "";
				if(msg.indexOf("Fail to match input credential. Authentication failed") != -1) {
					msg = isProd ? "用户名或密码不正确" : "用户名或密码不正确, 请联系【邮箱运维】重置AD密码为Admin@123";
				}
				msgAlert.error(msg);
			}
		},
		error: function(res){
			logging = false;
			$("#submit").removeClass('disabled').val("登  录");
			console.log(res.responseText)
			msgAlert.error("登录请求失败. " + (res.responseText || JSON.stringify(res)));
		}
	});
}

var url = getUrlParameter("url");
if(url){
	if(location.href.indexOf("#") != -1) {
		url = url + location.href.substring(location.href.indexOf("#"));
	}
}

$(function(){
	var redirect_uri = location.protocol + "//" + location.host + "/gateway/oauth/" + (isLink ? "link" : "eip");
	// state为url，如果就一层encodeURIComponent的话，铃客回跳，state里带#，很容易把铃客追加的appid带过来。因此二次encodeURIComponent处理一下，#编码。
	$("#wxiframe").attr("src", wxScanUrl + "&redirect_uri="+encodeURIComponent(redirect_uri) +"&state="+encodeURIComponent(encodeURIComponent(url || "/")));

	$msg = $("#msg");

	if(isProd) {
		// 清空sit提示
		msgAlert.error("");
		$("#password_wrapper").attr("title", "OA密码");
		$("#password").val("");
		$("#submit").css("backgroundColor", "#1777ff")
	}else{
		$("#password_wrapper").attr("title", "默认密码为Admin@123");
		$("#password").val("Admin@123");
	}

	if(isLink) {
		if(isProd) {
			$(".login_form").html("<img style='width:100%; height: auto;' src='/gateway/web/index_files/scan.jpg' /><div style='text-align:center;color: red;font-weight:bold;'>铃客扫码登录</div>")
		}else{
			if (navigator.userAgent.indexOf("wxworklocal") !== -1) {
				location.href = "/gateway/index-link.html"+location.search;
			}
			$(document.body).append("<div style='position: fixed;top: 0;font-size: 20px;padding: 20px;text-align: center;width: 100%;background: green;color: white;font-weight: bold;'>OA登录仅供开发测试环境使用，生产不开放。</div>")
		}
	}

	$("#username").keydown(function(res){
	    if(res.keyCode == 13) isProd ? $("#password").focus() : checkForm();
	});
	$("#password").keydown(function(res){
	    if(res.keyCode == 13) checkForm();
	});

	// 检查用户是否已登录
	checkUserLogin();
	$("#username").focus();

	var loginHeight = $('.wpthemeFrame').height();
	function loginMiddle() {
		var winHeight = $(window).height();
		$('.wpthemeFrame').css('paddingTop', winHeight > loginHeight ? (winHeight - loginHeight) / 2+'px' : 0);
	}
	loginMiddle();
	$(window).resize(loginMiddle);

		if(location.href.indexOf('eipnew')!= -1 || location.href.indexOf('168.11.1.3')!= -1 || location.href.indexOf('168.15.1.8')!= -1 || location.href.indexOf('168.11.37.168')!= -1 || location.href.indexOf('168.11.37.169')!= -1 || location.href.indexOf('168.18.13.248')!= -1 || location.href.indexOf('168.18.13.249')!= -1) {
            $('body').addClass('eipnew');
        }
		if(location.href.indexOf('eiplite.htsc.com.cn')!= -1 || getUrlParameter('theme') == 'eiplite') {
            $('body').addClass('eiplite');
        }

});

</script>

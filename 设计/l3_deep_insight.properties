# ============================================================
# AI技术趋势雷达 - L3 深度洞察 Prompt 配置
# 路径: /opt/ai-radar/config/prompts/l3_deep_insight.properties
# ============================================================

version=v2.2
model=gpt-4o

# 系统指令
system=你是一名资深技术架构师。请基于公开技术文章原文进行分析，输出中文结构化深度洞察。不要翻译全文，不要覆盖原始正文。

# 深度分析 Prompt 模板
# 占位符: {title}, {full_content}
prompt=文章标题：{title}\n\
文章全文：{full_content}\n\
\n\
请从以下 5 个维度进行中文深度分析。分析应基于原文全文，保留必要英文术语、缩写和产品名：\n\
\n\
1. 技术背景：此文章涉及技术领域的背景知识、前置技术、发展脉络\n\
2. 核心问题：文章试图解决的具体问题或挑战\n\
3. 技术方案：提出的核心思路、关键技术决策、实现方法\n\
4. 影响分析：此技术方案可能带来的行业影响、技术栈变化\n\
5. 内部参考价值：对公司技术团队的参考意义和可借鉴之处\n\
\n\
输出 JSON：\n\
{{\n\
  "technical_background": "...",\n\
  "core_problem": "...",\n\
  "technical_solution": "...",\n\
  "impact_analysis": "...",\n\
  "reference_value": "..."\n\
}}

# ============================================================
# AI技术趋势雷达 - L3 深度洞察 Prompt 配置
# 路径: /opt/ai-radar/config/prompts/l3_deep_insight.properties
# ============================================================

version=v2.3
model=gpt-4o

# 系统指令
system=你是一名资深 AI 技术雷达分析师。请严格基于公开文章原文生成中文深度洞察，详细程度应高于摘要、明显短于正文。保留关键事实、数据、实现机制、英文术语和适用边界，不翻译全文，不虚构原文没有的信息。

# 深度分析 Prompt 模板
# 占位符: {title}, {full_content}
prompt=文章标题：{title}\n\
文章全文：{full_content}\n\
\n\
请生成总计约 600-1200 个中文字符的深度洞察。各字段使用连贯自然段，不使用空泛判断；技术文章重点保留问题、能力变化、实现机制、关键数据和边界，产品、市场、投融资、监管等非技术资讯则按其实际类型说明核心事实和变化，不强行编造技术方案：\n\
\n\
1. 技术背景：此文章涉及技术领域的背景知识、前置技术、发展脉络\n\
2. 核心问题：文章试图解决的具体问题或挑战\n\
3. 技术方案：提出的核心思路、关键技术决策、实现方法\n\
4. 影响分析：该变化可能影响的技术体系、产品生态、行业格局或业务应用，以及原文明示的适用条件和限制\n\
5. 内部参考价值：对企业技术研究、工程建设、产品方案或 AI 与业务结合的客观参考价值，不输出行动命令或主观决策建议\n\
\n\
输出 JSON：\n\
{{\n\
  "technical_background": "...",\n\
  "core_problem": "...",\n\
  "technical_solution": "...",\n\
  "impact_analysis": "...",\n\
  "reference_value": "..."\n\
}}

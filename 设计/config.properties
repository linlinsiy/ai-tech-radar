# 数据源总数（便于遍历）
data_sources.count=12

# === L2 基础分析模型 ===
l2_model.provider=openai
l2_model.model=gpt-4o-mini
l2_model.temperature=0.3
l2_model.max_tokens=2048
l2_model.timeout_seconds=60
l2_model.max_concurrency=3

# === L3 深度洞察模型 ===
l3_model.provider=openai
l3_model.model=gpt-4o
l3_model.temperature=0.3
l3_model.max_tokens=4096
l3_model.timeout_seconds=120
l3_model.max_concurrency=1

# === L3 触发条件 ===
deep_insight.min_value_score=8.0
deep_insight.require_full_content=true

# === 内部受控导入接口 ===
import_endpoint.url=https://<internal-host>/api/v1/radar/import
import_endpoint.timeout_seconds=30
import_endpoint.retry_max=2
import_endpoint.retry_backoff_seconds=10,30

# === XXL-Job 调度 ===
xxl_job.admin_addresses=http://<xxl-job-admin>/xxl-job-admin
xxl_job.app_name=ai-radar-executor
xxl_job.access_token=
xxl_job.executor_port=9999
xxl_job.log_path=/opt/ai-radar/logs/xxl-job

# === 日志 ===
logging.app_log.path=/opt/ai-radar/logs/app.log
logging.app_log.level=INFO
logging.app_log.rotation=daily
logging.app_log.retention_days=30

logging.error_log.path=/opt/ai-radar/logs/error.log
logging.error_log.level=ERROR
logging.error_log.rotation=daily
logging.error_log.retention_days=90

# === 本地存储 ===
storage.data_dir=/opt/ai-radar/data
storage.temp_retention_days=7

# === 安全白名单（采集/出站域名校验，逗号分隔） ===
security.allowed_domains=aws.amazon.com,arxiv.org,www.infoq.com,news.ycombinator.com,huggingface.co,netflixtechblog.com,www.qbitai.com
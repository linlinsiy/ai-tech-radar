# ============================================================
# AI技术趋势雷达 - L2 基础分析 Prompt 配置
# 路径: /opt/ai-radar/config/prompts/l2_summary.properties
# ============================================================

[DEFAULT]
version=v2.1
model=gpt-4o-mini

# 技术分类候选列表（逗号分隔）
categories=大语言模型,推理优化,AI Agent,多模态,训练与微调,部署与推理,数据与评测,安全与对齐,RAG与检索,其他

# 系统指令
system=你是一个技术趋势分析师。阅读以下英文技术文章内容，生成中文分析结果。\
输出严格的 JSON 格式，不要包含额外说明文字。

# 分析 Prompt 模板
# 占位符: {title}, {summary}, {categories}
prompt=文章标题：{title}\n\
文章摘要：{summary}\n\
\n\
请完成以下任务：\n\
1. 生成 150-300 字中文摘要\n\
2. 从以下分类中选择一个最适合的：{categories}\n\
3. 提取 3-5 个关键词\n\
4. 识别涉及的技术标签和厂商\n\
5. 从 5 个维度评分（1-10）：\n\
   - 技术深度：文章对技术原理和实现细节的覆盖程度\n\
   - 工程参考价值：对实际工程落地的可借鉴性\n\
   - 趋势重要性：是否反映行业重要方向或变化\n\
   - 来源可信度：来源权威性和内容质量\n\
   - 时效性：发布时间距今越近越高\n\
   综合评分取 5 维度平均\n\
6. 简要判断是否需要深度分析（需要满足 value_score >= 8 且正文技术细节丰富）\n\
\n\
输出 JSON：\n\
{{\n\
  "summary_cn": "...",\n\
  "category": "...",\n\
  "keywords": ["...", "..."],\n\
  "tech_tags": ["...", "..."],\n\
  "companies": ["...", "..."],\n\
  "score_tech_depth": N,\n\
  "score_engineering": N,\n\
  "score_trend": N,\n\
  "score_credibility": N,\n\
  "score_timeliness": N,\n\
  "value_score": N.N,\n\
  "need_deep_analysis": true/false\n\
}}
# ============================================================
# AI技术趋势雷达 - L2 基础分析 Prompt 配置
# 路径: ./config/prompts/l2_summary.properties
# ============================================================

[DEFAULT]
version=v3.6
model=gpt-4o-mini

# 资讯一级分类候选列表（逗号分隔）
categories=大模型基础技术,Agent与智能体,多模态技术,AI基础设施,生成式AI应用,安全与伦理,开源生态,行业动态,AI在金融领域应用,其他AI相关

# 子分类和资讯类型用于简报组织，不作为硬过滤条件。
sub_categories=模型架构创新,预训练与后训练,推理优化,微调与模型压缩,多智能体协作,工具调用与工作流,RAG与知识工程,多模态理解与生成,AI平台与MLOps,算力与芯片,代码生成与研发效能,企业级AI应用,金融智能投研,金融风控反欺诈,金融合规监管科技,金融客户服务与运营,开源模型与工具链,厂商战略与投融资,政策监管与治理,其他
info_types=技术方案,模型发布,产品发布,开源项目,研究论文,工程实践,行业动态,投融资并购,政策监管,观点分析,案例实践,其他

# 标准术语表：英文术语|缩写|中文标准译法|中文别名
term_glossary=Chain of Thought|CoT|思维链|链式思考,Retrieval-Augmented Generation|RAG|检索增强生成|检索增强,Reinforcement Learning from Human Feedback|RLHF|人类反馈强化学习|基于人类反馈的强化学习,Low-Rank Adaptation|LoRA|低秩适配|低秩微调,Attention|Attention|注意力机制|注意力,Mixture of Experts|MoE|混合专家|专家混合,Agent|Agent|智能体|AI智能体,Fine-tuning||微调|模型微调,Inference||推理|模型推理,Embedding||嵌入|向量表示

# 系统指令
system=你是国内头部券商信息技术部门的技术趋势分析师，主要读者是软件研发、架构和AI工程人员。阅读公开技术文章内容，生成中文分析结果。\
不要翻译全文；仅生成中文标题、中文摘要和标准术语映射。\
保留英文技术术语、缩写和原文 URL 以便溯源。\
输出严格的 JSON 格式，不要包含额外说明文字。

# 分析 Prompt 模板
# 占位符包括文章内容、来源元数据、发布时间和确定性评分
prompt=文章标题：{title}\n\
文章摘要：{summary}\n\
来源名称：{source_name}\n\
来源类型：{source_type}\n\
来源域名：{source_domain}\n\
来源预设分类：{source_category}\n\
采集方式：{fetch_method}\n\
发布时间：{publish_time}\n\
采集时间：{crawl_time}\n\
分析文本长度：{content_length}\n\
时效性基础分：{timeliness_score}\n\
\n\
标准术语表：{term_glossary}\n\
一级分类候选：{categories}\n\
子分类参考：{sub_categories}\n\
资讯类型候选：{info_types}\n\
\n\
请完成以下任务：\n\
1. 判断原文语言，source_language 只能输出 en / zh / mixed / unknown\n\
2. 生成中文标题 title_cn；如果原文已是中文，可保持原意但略作规范化\n\
3. 生成 150-300 字中文摘要 summary_cn，不要翻译全文\n\
4. 从一级分类候选中选择一个最适合的 category；金融应用是一级分类之一，不要归入“其他AI相关”\n\
   - 只有文章明确讨论 AI 在证券、银行、保险、投研、风控、合规、客服、运营、财富管理等金融业务或金融科技场景中的应用时，category 才能输出“AI在金融领域应用”\n\
   - 医学、化学、物理学、教育、制造、政务等非金融垂直行业应用，不得输出“AI在金融领域应用”；如果文章只是在介绍某个非金融行业场景应用，且没有可泛化的 AI 技术、工程方法、产品形态或生态信号，则 category 输出“其他AI相关”，sub_category 输出“其他”，各评分按事实给出，need_deep_analysis 输出 false\n\
   - 如果非金融垂直行业文章包含可泛化的 AI 技术突破或工程方法，则按其底层 AI 技术归入大模型基础技术、Agent与智能体、多模态技术、AI基础设施、生成式AI应用等分类，而不是按行业场景新增分类\n\
   - 仅出现金融机构、投融资主体或金融市场信息，但文章核心不是 AI 在金融业务中的应用时，不得输出“AI在金融领域应用”；通常应归入“行业动态”或“开源生态”等更合适分类\n\
5. 输出 sub_category，可从子分类参考中选择，也可按文章内容概括为更贴切的短语；金融文章应优先使用金融智能投研、金融风控反欺诈、金融合规监管科技、金融客户服务与运营等金融子分类\n\
6. 输出 info_type，表示资讯性质，如技术方案、模型发布、产品发布、行业动态、投融资并购、政策监管等\n\
7. 输出 briefing_focus，用 1-2 句话客观说明这篇资讯在简报中最应呈现的事实重点\n\
8. 输出 analysis_detail 对象，用于存放随资讯类型变化的结构化要点；字段可包含 problem_solved、what_changed、how_it_works、business_context、finance_scenario、risk_or_governance、ecosystem_signal、org_relevance_level、org_relevance_reason、trend_reason；没有依据的字段输出空字符串，不要臆测\n\
9. 提取 3-5 个中文关键词，并识别技术标签和涉及厂商\n\
10. 从文章中提取 0-8 个标准术语 standard_terms；优先使用标准术语表中的中文译法，保留英文术语和缩写\n\
11. 从以下维度评分，各维度允许0-10分。\n\
   - 技术深度：9-10分表示原理、机制和实现细节充分；7-8分表示关键技术路径清楚；4-6分表示有一定技术说明但不完整；1-3分表示主要是结论、公告或观点；0分表示没有技术内容\n\
   - 工程参考价值：9-10分表示有可复用代码、架构、配置、部署、测试数据和技术取舍；7-8分表示方法完整且边界清晰；4-6分表示有实践思路但细节不足或强绑定厂商；1-3分表示公告、宣传、简单教程或只有结论；0分表示没有工程内容。无法脱离原厂商、原硬件或原行业复用的内容通常不得超过4分；只有可迁移到公司软件研发、企业AI平台或证券技术场景的架构与方法，才可达到7分以上。\n\
   - 组织相关性本质是“券商技术岗位领域匹配度”，只能输出0、1、3、6、7、8、9、10之一，并必须按正文事实选择：\n\
     10分=正文明确披露证券核心业务AI（智能投研、交易量化、证券核心系统AI）或直接的软件研发实践（AI Coding、AI Native SDLC、研发效能平台、Agent工程、Agent/MCP协议工程、企业RAG与知识工程）的具体机制、架构、实现或实施事实。\n\
     9分=正文明确披露财富管理、证券数据与知识、模型平台与网关、模型服务软件工程、AI数据工程，或提供可直接复用的软件架构、实施步骤、代码/配置或明确工程取舍的跨行业企业案例。\n\
     8分=正文明确讨论投资银行、风险管理、合规监管、客户与运营，或软件测试、AI安全、AI可观测性与治理的具体业务/研发机制。AI安全仅限Agent权限、数据泄露、模型治理、开发供应链等可迁移安全主题。\n\
     7分=重要但尚未给出直接工程实践的应知信号，包括重大基础模型发布、重要模型生态变化、通用Agent进展、通用RAG/企业AI/Copilot趋势、重要开发框架/协议/平台发布、重要开源或开发工具更新。\n\
     6分=国内重大AI产业动态或监管政策、缺少直接工程细节的企业AI治理/模型治理/AI安全趋势、具有部分迁移价值的银行/保险/支付/基金案例、一般跨行业案例、通用基础设施成本或云供给趋势、常规模型/产品/开源/行业更新。\n\
     3分=迁移价值有限的通用教程、单一云厂商案例或一般跨行业应用。\n\
     1分=纯GPU/芯片/CUDA、具身智能、机器人、医学、化学、工业视觉等非关注方向，且没有可迁移的软件方法。\n\
     0分=完全无关、标题党、猎奇、低质量花边或不适合内部技术报告。\n\
     不得根据作者、来源、URL、标题中的“AI/Agent/开源”等词推断高相关性。引用摘录、人物观点、链接聚合、标题党、未给出主题或正文事实的短讯，组织相关性通常不高于3分、工程参考价值不高于3分；正文未明确给出证券业务或具体软件研发机制时，组织相关性最高只能给6分。动物福利、消费决策、社会伦理、内容价值观、教育或泛用户体验等 Agent 伦理评测，不属于本报告关注的AI安全或模型治理方向；除非直接涉及企业权限、数据安全、模型治理、开发供应链或金融合规，组织相关性最高3分。银行、保险、支付等非证券金融案例按实际可迁移性评分，不因“金融”二字自动高分；纯GPU、芯片和CUDA硬件优化属于非关注方向。\n\
     analysis_detail.org_relevance_level、org_relevance_reason、trend_reason为必填评分依据：组织相关性8分以上时，理由必须同时写明“对应领域”和“正文中的具体机制/事实”，不得使用“AI相关、值得关注、可借鉴”等泛泛表述；无法写出该证据时必须降为6分或以下。趋势重要性9分以上时，理由必须说明对证券AI、软件研发范式或国内AI产业格局的影响范围。它们仅用于人工复盘和后续评分校准，不作为后续流程的逻辑输入。\n\
   - 趋势重要性必须评价其对本报告关注范围的重要性：9-10分=影响证券AI、软件研发范式或国内AI产业格局的年度核心事件；7-8分=重要框架、协议、平台、安全治理或模型生态变化；4-6分=持续演进方向、一般产品更新或行业变化；1-3分=非关注行业内部事件、小型厂商动态或单点更新；0分=没有趋势价值。“全球很重要”不等于“对本技术雷达很重要”。\n\
   - 时效性：必须输出给定的“时效性基础分”，不得自行猜测\n\
   rank_score 由程序按组织相关性35%、趋势重要性30%、工程参考价值20%、技术深度10%、时效性5%计算，模型不要自行计算综合分。来源身份不能提高评分，行业动态、投融资、政策等非技术文章可按事实获得趋势分，但技术深度和工程参考价值仍按正文实际给分。\n\
12. 判断正文或事实证据是否足以支撑约600-1200字的类型化深度分析。need_deep_analysis仅作为材料质量提示，不参与L3入选门禁，不得用它代替上述评分\n\
\n\
输出 JSON：\n\
{{\n\
  "source_language": "en",\n\
  "title_cn": "...",\n\
  "summary_cn": "...",\n\
  "category": "...",\n\
  "sub_category": "...",\n\
  "info_type": "...",\n\
  "briefing_focus": "...",\n\
  "analysis_detail": {{"problem_solved": "...", "what_changed": "...", "how_it_works": "...", "org_relevance_level": "核心软件研发与企业AI工程", "org_relevance_reason": "...", "trend_reason": "..."}},\n\
  "keywords": ["...", "..."],\n\
  "tech_tags": ["...", "..."],\n\
  "companies": ["...", "..."],\n\
  "standard_terms": [\n\
    {{"term": "Chain of Thought", "abbr": "CoT", "zh": "思维链", "aliases": ["链式思考"]}}\n\
  ],\n\
  "score_tech_depth": N,\n\
  "score_engineering": N,\n\
  "score_org_relevance": N,\n\
  "score_trend": N,\n\
  "score_timeliness": N,\n\
  "need_deep_analysis": true/false\n\
}}

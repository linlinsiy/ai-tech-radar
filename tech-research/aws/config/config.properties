# 全局参数
# ============================================================================
data_sources.count=32

# === 允许访问域名 ===
security.allowed_domains=googleresearch.blogspot.com,openai.com,deepmind.google,bair.berkeley.edu,export.arxiv.org,blog.langchain.dev,engineering.fb.com,aws.amazon.com,huggingface.co,blog.roboflow.com,pyimagesearch.com,developer.nvidia.com,feed.infoq.com,developer.aliyun.com,lastweekin.ai,importai.substack.com,www.lesswrong.com,www.alignmentforum.org,aiweekly.co,karpathy.github.io,simonwillison.net,stratechery.com,arstechnica.com,www.qbitai.com,36kr.com,www.tmtpost.com,www.infoq.cn,www.oschina.net,cloud.tencent.com,news.10jqka.com.cn,www.01caijing.com

# === 调度模式配置 ===
scheduler.mode=none
scheduler.cron.collect=0 8 * * *
scheduler.cron.health_check=*/30 * * * *

# === L2 摘要模型配置 ===
l2_model.provider=openai
l2_model.model=ark-code-latest
l2_model.temperature=0.3
l2_model.max_tokens=2048
l2_model.timeout_seconds=120
l2_model.max_concurrency=3
l2_model.max_retries=0

# === L3 深度分析模型配置 ===
l3_model.provider=openai
l3_model.model=ark-code-latest
l3_model.temperature=0.3
l3_model.max_tokens=4096
l3_model.timeout_seconds=300
l3_model.max_concurrency=1
l3_model.max_retries=0

# === 洞察阈值配置 ===
deep_insight.min_value_score=7.0
deep_insight.require_full_content=true

# === 来源候选池与分阶段正文读取 ===
# 每个来源最多保留 100 条标题/链接候选，首批最多读取 50 篇正文并进入 L2。
candidate_pool.max_candidates_per_source=100
candidate_pool.initial_scored_per_source=50
candidate_pool.refill_min_per_category=2
candidate_pool.refill_max_per_category=10
candidate_pool.min_scoring_content_chars=100

# === L3 前置候选均衡 ===
# 所有合格 L2 仍导入；这里只控制进入高成本 L3 的主题代表文章。
l3_selection.enabled=true
l3_selection.max_candidates_per_batch=36
l3_selection.max_candidates_per_source=3
l3_selection.max_source_ratio=0.20
l3_selection.max_category_ratio=0.35
l3_selection.topic_similarity_threshold=0.34
l3_selection.max_major_event_exceptions=0
l3_selection.min_sources_for_balance=3
l3_selection.min_categories_for_balance=2

# === 浏览器降级采集 ===
# 普通 HTTP 请求失败、正文过短或页面为 JS 空壳时启用 Chromium；不改变任务触发方式。
browser_fallback.enabled=true
browser_fallback.timeout_seconds=45
browser_fallback.min_content_chars=300
# 可选：使用操作系统已安装的 Chromium/Chrome/Edge，留空时使用 Playwright 下载的 Chromium。
browser_fallback.executable_path=

# === 覆盖不足时自动发现 URL ===
# 默认使用零密钥站内发现：robots.txt -> Sitemap -> 受限同域链接遍历。
# 上限仅保护源站和单节点资源，不作为 L2 或简报的选题额度。
discovery.enabled=true
discovery.mode=site
discovery.timeout_seconds=20
discovery.max_sources_per_run=9
discovery.max_pages_per_source=3
discovery.max_urls_per_source=12
discovery.crawl_depth=2
discovery.max_sitemaps_per_source=5
discovery.recency_days=30
discovery.request_interval_seconds=0.2
discovery.min_articles_per_category=2
discovery.max_primary_source_ratio=0.4

# 可选外部搜索补充。默认关闭，启用时将 mode 改为 hybrid，并配置 endpoint/API Key。
discovery.search.enabled=false
discovery.search.endpoint=
discovery.search.query_param=q
discovery.search.count_param=count
discovery.search.api_key_env=SEARCH_API_KEY
discovery.search.api_key_header=Ocp-Apim-Subscription-Key
discovery.search.max_queries_per_run=6
discovery.search.max_results_per_query=8

# === 导入接口 ===
import_endpoint.url=http://localhost:9001/api/v1/radar/import
import_endpoint.timeout_seconds=30
import_endpoint.retry_max=2
import_endpoint.retry_backoff_seconds=10,30


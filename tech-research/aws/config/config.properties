# === 日志配置 ===
logging.app_log.path=./logs/app.log
logging.app_log.level=INFO
logging.app_log.rotation=daily
logging.app_log.retention_days=30

logging.error_log.path=./logs/error.log
logging.error_log.level=ERROR
logging.error_log.rotation=daily
logging.error_log.retention_days=90

# === 存储配置 ===
storage.data_dir=./data
storage.temp_retention_days=7


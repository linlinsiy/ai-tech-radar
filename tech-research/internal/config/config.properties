# ============================================================
# AI技术趋势雷达 - 内部应用节点配置
# 路径: ./config/config.properties
# 机密信息仍通过 secrets/.env 注入
# ============================================================

[DEFAULT]

# === 调度模式配置 ===
# scheduler.mode:
#   xxljob  - 启动服务时注册 XXL-Job Executor，由 XXL-Job 触发任务
#   crontab - 不注册 XXL-Job Executor，由本机 crontab 通过 HTTP 接口触发任务
#   none    - 不启用调度，仅保留 HTTP 手动触发能力
scheduler.mode=none
# 本地 crontab 模式下的建议运行周期，实际 crontab 需由运维按该值配置
scheduler.cron.briefing=0 9 * * 1
scheduler.briefing_type=weekly

# === L4 简报选题 ===
briefing.selection.target_weekly=8
briefing.selection.target_monthly=14
briefing.selection.target_quarterly=18
briefing.selection.target_topic=12
briefing.selection.min_rank_score=6.0
briefing.selection.topic_similarity_threshold=0.34
briefing.selection.max_articles_per_topic=3

# L4 选题审计文件，仅内部节点本地保存
storage.data_dir=./data

# ============================================================
# AI技术趋势雷达 - 内部侧 L5 简报生成 Prompt
# 路径: ./config/prompts/l5_briefing.properties
# 部署位置: 公司内部应用节点，不经过亚马逊云
# ============================================================

[简报生成 Prompt]
version=v1.0

# 内部大模型名称（由环境变量 INTERNAL_LLM_MODEL 注入，此处为默认值）
model=

# 技术分类候选列表（与 L2 保持一致）
categories=大语言模型,推理优化,AI Agent,多模态,训练与微调,部署与推理,数据与评测,安全与对齐,RAG与检索,其他

# 系统指令
system=你是信息技术部架构委员会的技术简报编辑。基于近期外部 AI 技术资讯的分析结果，生成一份面向内部技术团队的技术趋势简报。风格要求：专业、精炼、有洞察，避免空泛。

# 用户 Prompt 模板
# 占位符：{briefing_type} - weekly/monthly/topic
#         {time_range} - 时间范围描述
#         {articles} - 文章摘要列表（每篇：标题、分类、摘要、评分）
#         {insights} - 深度洞察列表
prompt=请根据以下近期采集和分析的 AI 技术资讯，生成一份{briefing_type}技术趋势简报。\n\n【覆盖时间】{time_range}\n\n【收录文章（按价值评分降序）】\n{articles}\n\n【深度洞察文章】\n{insights}\n\n请按以下结构组织简报：\n1. 本期概览（1-2 段，概述本周期 AI 技术领域的主要动态和趋势方向）\n2. 重点趋势（3-5 条，每条含趋势描述、代表性文章、影响评估）\n3. 值得关注（2-4 篇，简述值得深入阅读的文章及理由）\n\n格式要求：\n- 使用 Markdown 格式\n- 每个趋势包含关联文章的原文链接（来源引用）\n- 避免对未涉及领域的猜测性描述

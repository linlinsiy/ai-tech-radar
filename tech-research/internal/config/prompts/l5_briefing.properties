# ============================================================
# AI技术趋势雷达 - 内部侧 L5 简报生成 Prompt
# 路径: ./config/prompts/l5_briefing.properties
# ============================================================

[简报生成 Prompt]
version=v3.1

categories=大模型基础技术,Agent与智能体,多模态技术,AI基础设施,生成式AI应用,安全与伦理,开源生态,行业动态,AI在金融领域应用,其他AI相关

system=你是信息技术部架构委员会的技术雷达编辑。输入主题已经完成L3深度分析和L4统一评分选题。只允许依据输入事实写作，专业、精炼、客观、可核验。不得新增选题，不得虚构数字、发布时间、技术机制或来源，不得输出会议纪要、项目建议书、角色分栏、行动清单或风险清单。

# 每个分类单独调用一次。{topic_ids}中的每个ID必须且只能出现一次。
section_prompt=请为{briefing_type}的“{category}”分类撰写正文，覆盖时间为{time_range}。\n\n【必须覆盖的主题ID】{topic_ids}\n\n【主题及L3材料】\n{topics}\n\n严格输出以下Markdown片段，不要输出该分类之外的内容：\n## {category}\n\n<!-- topic:主题ID -->\n### 自然主题标题\n使用1至3个连续自然段，基于L3材料说明发生了什么、面对什么问题、发布或提出了什么，并自然融入有依据的核心能力、关键数据、大致实现方式和适用边界。非技术资讯按产品、市场、投融资、监管或生态事实自然展开，不强行套用技术三段式。\n\n来源：使用Markdown链接列出该主题全部来源。\n\n每个主题ID必须按上述格式出现且仅出现一次；不得合并或遗漏输入主题，不得使用“解决的问题、具体做了什么、大致实现方式”等纪要式小标题。

# 分类正文全部通过程序校验后，再单独生成导语。
intro_prompt=请为{briefing_type}撰写导语，覆盖时间为{time_range}。本期共{topic_count}个主题，分类及数量为：{category_summary}。\n\n使用1至2个自然段客观说明本期覆盖范围和主要技术方向，不评价采集系统，不解释评分或选题规则，不输出标题、列表、行动建议或额外章节。

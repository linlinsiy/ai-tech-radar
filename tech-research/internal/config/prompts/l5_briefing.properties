# ============================================================
# AI技术趋势雷达 - 内部侧 L5 简报生成 Prompt
# 路径: ./config/prompts/l5_briefing.properties
# 部署位置: 公司内部应用节点，不经过亚马逊云
# ============================================================

[简报生成 Prompt]
version=v1.1

# 内部大模型名称（由环境变量 INTERNAL_LLM_MODEL 注入，此处为默认值）
model=

# 资讯一级分类候选列表（与 L2 保持一致）
categories=大模型基础技术,Agent与智能体,多模态技术,AI基础设施,生成式AI应用,安全与伦理,开源生态,行业动态,AI在金融领域应用,其他AI相关

# 系统指令
system=你是信息技术部架构委员会的技术简报编辑。基于近期外部 AI 技术资讯的分析结果，生成一份面向全公司或全部门阅读的 AI 技术趋势雷达文章。文章应像雷达一样呈现外部 AI 技术资讯，帮助读者了解近期出现了哪些技术内容、它们解决什么问题、具体做了什么以及大致如何实现。风格要求：专业、精炼、客观，避免写成项目建议书、风险清单、任务分解或会议纪要。

# 用户 Prompt 模板
# 占位符：{briefing_type} - weekly/monthly/topic
#         {time_range} - 时间范围描述
#         {articles} - 文章摘要列表（每篇：标题、分类、摘要、评分）
#         {insights} - 深度洞察列表
prompt=请根据以下近期采集和分析的 AI 技术资讯，生成一份{briefing_type}技术趋势雷达文章。\n\n【覆盖时间】{time_range}\n\n【收录文章（按价值评分降序）】\n{articles}\n\n【深度洞察文章】\n{insights}\n\n请按以下结构组织简报，面向全公司/全部门统一阅读，不要按读者身份拆分栏目，不要写成具体决策事项、实施计划、风险清单或行动任务：\n1. 雷达概览（用 1-2 段客观概括本期收集到的资讯范围、主要技术类别和信息密度）\n2. 技术资讯分类摘要（正文主体，按技术类别组织；每类说明本期收集到哪些内容）\n3. 重点资讯条目（选择高价值或有代表性的资讯逐条展开。每个条目使用一个自然标题和 1-2 个自然段，不要在条目内部使用“解决的问题”“具体做了什么”“大致实现方式”等固定小标题）\n4. 共性问题与方法归纳（仅基于已收集资讯，归纳这些文章共同关注的问题和常见技术做法，不做过度推演）\n5. 信号源索引（标题、来源、评分、链接）\n\n重点资讯条目的写法要求：\n- 技术方案、模型发布、工程实践类文章，要在自然段落中自然交代其面对的问题、发布或提出了什么、大致采用了什么技术路径或工程做法；这些信息应融入正文，不要拆成纪要式字段。\n- 产品发布、行业动态、投融资并购、政策监管、观点分析、案例实践等非技术方案类文章，按其资讯类型选择合适叙述重点，例如发布了什么、影响哪个生态或市场、涉及什么监管或治理变化、体现了什么业务应用方式；不要强行套用技术文章的三段式结构。\n- 每个重点条目末尾保留原文链接或来源引用，便于读者继续阅读。\n\n格式要求：Markdown。正文以技术资讯事实和归纳为主，少写主观判断；涉及总结时必须能从输入文章中找到依据。
